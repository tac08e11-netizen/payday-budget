<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>PayDay Budget</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-primary: #1a1a2e; --bg-card: #16213e; --bg-input: #0f3460;
            --accent: #00d4aa; --accent-hover: #00b894;
            --text: #eee; --text-muted: #888; --text-dim: #666;
            --danger: #e74c3c; --warning: #f39c12; --blue: #3498db;
            --purple: #9b59b6; --border: #234;
        }
        [data-theme="ocean"] { --bg-primary:#0a192f;--bg-card:#112240;--bg-input:#1d3557;--accent:#64ffda;--accent-hover:#4cd9b0; }
        [data-theme="purple"] { --bg-primary:#1a1025;--bg-card:#2d1b4e;--bg-input:#3d2466;--accent:#bb86fc;--accent-hover:#9c5cf7; }
        [data-theme="orange"] { --bg-primary:#1a1410;--bg-card:#2d2015;--bg-input:#3d2a1a;--accent:#ff9f43;--accent-hover:#e08530; }
        [data-theme="light"] { --bg-primary:#f0f2f5;--bg-card:#fff;--bg-input:#e8ecf0;--accent:#00a884;--accent-hover:#008c6e;--text:#1a1a2e;--text-muted:#555;--text-dim:#888;--border:#ddd; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg-primary); color:var(--text); min-height:100vh; padding:16px; padding-bottom:90px; transition:background .3s,color .3s; }
        /* Header & Nav */
        .header { display:flex; justify-content:space-between; align-items:center; padding:10px 0 14px; }
        .header h1 { font-size:1.4rem; color:var(--accent); }
        .header-right { display:flex; gap:8px; }
        .btn-icon { width:36px;height:36px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center; }
        .btn-icon:active { transform:scale(0.9); }
        .bottom-nav { position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 12px;z-index:900; }
        .nav-item { display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text-dim);font-size:0.7rem;cursor:pointer;padding:4px 12px; }
        .nav-item .nav-icon { font-size:1.2rem; }
        .nav-item.active { color:var(--accent); }

        /* Floating Action Button */
        .fab { position:fixed;bottom:75px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:var(--bg-primary);font-size:1.8rem;border:none;cursor:pointer;box-shadow:0 4px 15px rgba(0,212,170,0.4);z-index:800;display:flex;align-items:center;justify-content:center; }
        .fab:active { transform:scale(0.9); }

        /* Quick Log Panel */
        .quick-panel { position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top-left-radius:20px;border-top-right-radius:20px;padding:20px;z-index:950;transform:translateY(100%);transition:transform .3s ease;box-shadow:0 -5px 30px rgba(0,0,0,0.5); }
        .quick-panel.open { transform:translateY(0); }
        .quick-panel .qp-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:16px; }
        .quick-panel .qp-header h3 { color:var(--accent);font-size:1rem; }
        .quick-panel .qp-close { background:none;border:none;color:var(--text-muted);font-size:1.5rem;cursor:pointer; }
        .qp-favorites { display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px; }
        .qp-fav-btn { padding:8px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.8rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px; }
        .qp-fav-btn .fav-amt { color:var(--accent);font-weight:600;font-size:0.9rem; }
        .qp-fav-btn:active { background:var(--accent);color:var(--bg-primary); }
        .qp-cats { display:grid;grid-template-columns:repeat(4,1fr);gap:8px; }
        .qp-cat-btn { padding:10px 4px;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-size:0.7rem;cursor:pointer;text-align:center; }
        .qp-cat-btn .qp-cat-icon { font-size:1.2rem;display:block;margin-bottom:2px; }
        .qp-cat-btn:active { background:var(--accent);color:var(--bg-primary); }
        /* Dashboard */
        .dash-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px; }
        .dash-card { background:var(--bg-card);border-radius:14px;padding:14px;text-align:center; }
        .dash-card.wide { grid-column:1/-1; }
        .dc-label { color:var(--text-muted);font-size:0.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px; }
        .dc-value { font-size:1.4rem;font-weight:700;color:var(--accent); }
        .dc-value.warning { color:var(--warning); }
        .dc-value.danger { color:var(--danger); }
        .dc-sub { color:var(--text-dim);font-size:0.7rem;margin-top:2px; }

        /* Health Score */
        .health-card { background:var(--bg-card);border-radius:14px;padding:20px;text-align:center;margin-bottom:16px; }
        .health-ring { position:relative;width:100px;height:100px;margin:0 auto 10px; }
        .health-ring svg { transform:rotate(-90deg); }
        .health-ring .health-num { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.6rem;font-weight:700; }
        .health-label { color:var(--text-muted);font-size:0.8rem; }

        /* Donut Chart */
        .donut-section { background:var(--bg-card);border-radius:14px;padding:16px;margin-bottom:16px;text-align:center; }
        .donut-container { position:relative;width:160px;height:160px;margin:0 auto 12px; }
        .donut-container canvas { width:160px;height:160px; }
        .donut-center { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center; }
        .donut-center .dc-total { font-size:1.2rem;font-weight:700;color:var(--text); }
        .donut-center .dc-lbl { font-size:0.7rem;color:var(--text-dim); }
        .donut-legend { display:flex;flex-wrap:wrap;gap:8px;justify-content:center; }
        .legend-item { display:flex;align-items:center;gap:4px;font-size:0.7rem;color:var(--text-muted); }
        .legend-dot { width:8px;height:8px;border-radius:50%; }

        /* Daily Bar Chart */
        .barchart-section { background:var(--bg-card);border-radius:14px;padding:16px;margin-bottom:16px; }
        .barchart-section h4 { color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px; }
        .bar-chart { display:flex;align-items:flex-end;gap:3px;height:80px; }
        .bar-col { flex:1;display:flex;flex-direction:column;align-items:center;gap:2px; }
        .bar-fill { width:100%;border-radius:3px 3px 0 0;background:var(--accent);min-height:2px;transition:height .3s; }
        .bar-fill.high { background:var(--danger); }
        .bar-fill.med { background:var(--warning); }
        .bar-label { font-size:0.55rem;color:var(--text-dim); }
        /* Heat Calendar */
        .heatcal-section { background:var(--bg-card);border-radius:14px;padding:16px;margin-bottom:16px; }
        .heatcal-section h4 { color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px; }
        .heat-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:4px; }
        .heat-day { aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--text-dim); }
        .heat-day.lv0 { background:var(--bg-input); }
        .heat-day.lv1 { background:rgba(0,212,170,0.2);color:var(--accent); }
        .heat-day.lv2 { background:rgba(243,156,18,0.3);color:var(--warning); }
        .heat-day.lv3 { background:rgba(231,76,60,0.3);color:var(--danger); }
        .heat-day.empty { background:transparent; }
        .heat-labels { display:flex;justify-content:space-between;margin-bottom:6px; }
        .heat-labels span { font-size:0.6rem;color:var(--text-dim);width:calc(100%/7);text-align:center; }

        /* Weekly Report */
        .weekly-card { background:var(--bg-card);border-radius:14px;padding:16px;margin-bottom:16px;border-left:4px solid var(--accent); }
        .weekly-card h4 { color:var(--accent);font-size:0.85rem;margin-bottom:8px; }
        .weekly-card .wr-stat { display:flex;justify-content:space-between;font-size:0.8rem;padding:4px 0;border-bottom:1px solid var(--bg-input); }
        .weekly-card .wr-stat:last-child { border-bottom:none; }
        .weekly-card .wr-val { font-weight:600; }

        /* Goal Tracker */
        .goal-section { background:var(--bg-card);border-radius:14px;padding:16px;margin-bottom:16px; }
        .goal-section h4 { color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px; }
        .goal-bar { height:12px;background:var(--bg-input);border-radius:6px;overflow:hidden;margin-bottom:6px; }
        .goal-fill { height:100%;background:var(--accent);border-radius:6px;transition:width .3s; }
        .goal-info { display:flex;justify-content:space-between;font-size:0.8rem;color:var(--text-muted); }
        .goal-info .goal-current { color:var(--accent);font-weight:600; }

        .goals-list { display:flex;flex-direction:column;gap:10px;margin-bottom:14px; }
        .goal-card { background:var(--bg-card);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden; }
        .goal-card.complete { border:1px solid var(--accent); }
        .goal-card .gc-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:6px; }
        .goal-card .gc-name { font-size:0.9rem;font-weight:600; }
        .goal-card .gc-pct { font-size:0.75rem;color:var(--accent);font-weight:600; }
        .goal-card .gc-bar { height:8px;background:var(--bg-input);border-radius:4px;overflow:hidden;margin-bottom:6px; }
        .goal-card .gc-fill { height:100%;border-radius:4px;transition:width .4s ease; }
        .goal-card .gc-fill.complete { background:var(--accent); }
        .goal-card .gc-fill.inprogress { background:linear-gradient(90deg,var(--accent),var(--blue)); }
        .goal-card .gc-info { display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-dim); }
        .goal-card .gc-actions { display:flex;gap:6px;margin-top:8px; }
        .goal-card .gc-btn { padding:6px 12px;border-radius:8px;border:none;font-size:0.75rem;cursor:pointer;font-weight:600; }
        .gc-btn.add-funds { background:var(--accent);color:var(--bg-primary); }
        .gc-btn.buy-now { background:var(--warning);color:var(--bg-primary); }
        .gc-btn.delete { background:none;border:1px solid var(--danger);color:var(--danger); }
        .goal-card .gc-complete-badge { position:absolute;top:10px;right:10px;font-size:1.1rem; }
        .btn-add-goal { width:100%;padding:12px;background:var(--bg-card);border:2px dashed var(--border);border-radius:12px;color:var(--text-muted);font-size:0.85rem;cursor:pointer;margin-bottom:14px; }
        .btn-add-goal:active { border-color:var(--accent);color:var(--accent); }
        .add-goal-form { background:var(--bg-card);border-radius:14px;padding:16px;margin-bottom:14px; }
        .add-goal-form h4 { color:var(--accent);font-size:0.9rem;margin-bottom:12px; }
        .agf-row { display:flex;gap:8px;margin-bottom:8px; }
        .agf-row input { flex:1;padding:10px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.85rem;outline:none; }
        .agf-row input:focus { border-color:var(--accent); }
        .agf-buttons { display:flex;gap:8px; }
        .agf-buttons button { flex:1;padding:10px;border:none;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer; }

        /* Summary Bars */
        .summary-bars { margin-bottom:16px; }
        .summary-bar-item { background:var(--bg-card);border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px; }
        .sb-info { flex:1; }
        .sb-name { font-size:0.8rem;font-weight:500;margin-bottom:3px; }
        .sb-bar { height:5px;background:var(--bg-input);border-radius:3px;overflow:hidden; }
        .sb-fill { height:100%;border-radius:3px; }
        .sb-fill.good { background:var(--accent); }
        .sb-fill.warning { background:var(--warning); }
        .sb-fill.danger { background:var(--danger); }
        .sb-amount { font-size:0.8rem;font-weight:600;color:var(--accent);min-width:50px;text-align:right; }
        .sb-amount.warning { color:var(--warning); }
        .sb-amount.danger { color:var(--danger); }
        /* Category Cards */
        .categories { display:flex;flex-direction:column;gap:12px; }
        .category-card { background:var(--bg-card);border-radius:14px;padding:16px; }
        .category-card.protected { border-left:4px solid var(--blue); }
        .category-card.flexible { border-left:4px solid var(--warning); }
        .category-card.fun { border-left:4px solid var(--purple); }
        .category-card.overspent { border-left:4px solid var(--danger); }
        .card-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:10px; }
        .card-header .name { font-weight:600;font-size:0.95rem; }
        .badge { font-size:0.6rem;padding:2px 7px;border-radius:20px;text-transform:uppercase; }
        .badge.protected { background:#1a3a5c;color:var(--blue); }
        .badge.flexible { background:#3d2e0a;color:var(--warning); }
        .badge.fun { background:#2d1a3d;color:var(--purple); }
        .ring-row { display:flex;align-items:center;gap:14px;margin-bottom:10px; }
        .ring-container { position:relative;width:56px;height:56px;flex-shrink:0; }
        .ring-container svg { transform:rotate(-90deg); }
        .ring-container .ring-text { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.65rem;font-weight:700; }
        .ring-amounts { flex:1; }
        .ring-amounts .remaining { font-size:1.2rem;font-weight:700;color:var(--accent); }
        .ring-amounts .remaining.danger { color:var(--danger); }
        .ring-amounts .remaining.warning { color:var(--warning); }
        .ring-amounts .allocated { color:var(--text-dim);font-size:0.75rem; }
        .quick-adds { display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px; }
        .btn-quick { padding:5px 9px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-muted);font-size:0.7rem;cursor:pointer; }
        .btn-quick:active { background:var(--accent);color:var(--bg-primary); }
        .btn-spend { width:100%;padding:9px;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-size:0.85rem;cursor:pointer; }
        .btn-spend:active { background:var(--accent);color:var(--bg-primary); }

        /* Modal */
        .modal-overlay { display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center;padding:20px; }
        .modal-overlay.active { display:flex; }
        .modal { background:var(--bg-card);border-radius:20px;padding:24px;width:100%;max-width:340px;text-align:center; }
        .modal h3 { margin-bottom:14px;color:var(--accent);font-size:1rem; }
        .modal input[type="number"] { width:100%;padding:12px;font-size:1.6rem;background:var(--bg-input);border:2px solid var(--border);border-radius:12px;color:var(--text);text-align:center;outline:none;margin-bottom:8px; }
        .modal input[type="number"]:focus { border-color:var(--accent); }
        .modal .note-input { width:100%;padding:10px;font-size:0.85rem;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-muted);text-align:center;outline:none;margin-bottom:10px; }
        .modal .warning-msg { background:rgba(231,76,60,.15);border:1px solid var(--danger);border-radius:8px;padding:10px;margin-bottom:10px;font-size:0.75rem;color:var(--danger);display:none; }
        .modal .warning-msg.show { display:block; }
        .modal-buttons { display:flex;gap:10px; }
        .modal-buttons button { flex:1;padding:11px;border:none;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer; }
        .btn-confirm { background:var(--accent);color:var(--bg-primary); }
        .btn-cancel { background:#333;color:#ccc; }
        .theme-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0; }
        .theme-swatch { width:100%;aspect-ratio:1;border-radius:12px;cursor:pointer;border:3px solid transparent;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:#fff;font-weight:600; }
        .theme-swatch.active { border-color:var(--accent);transform:scale(1.05); }
        .theme-swatch[data-t="default"]{background:#1a1a2e;} .theme-swatch[data-t="ocean"]{background:#0a192f;} .theme-swatch[data-t="purple"]{background:#1a1025;} .theme-swatch[data-t="orange"]{background:#1a1410;} .theme-swatch[data-t="light"]{background:#f0f2f5;color:#333;}
        /* History */
        .history-filters { display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap; }
        .filter-btn { padding:5px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;color:var(--text-muted);font-size:0.7rem;cursor:pointer; }
        .filter-btn.active { background:var(--accent);color:var(--bg-primary);border-color:var(--accent); }
        .h-item { background:var(--bg-card);border-radius:10px;padding:10px 14px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center; }
        .h-left { flex:1; }
        .h-cat { font-size:0.75rem;color:var(--text-muted); }
        .h-note { font-size:0.8rem;color:var(--text);margin-top:1px; }
        .h-time { font-size:0.65rem;color:var(--text-dim);margin-top:1px; }
        .h-amount { font-size:0.95rem;font-weight:700;color:var(--danger); }
        .undo-btn { background:none;border:none;color:var(--text-dim);font-size:0.7rem;cursor:pointer;padding:4px 6px;margin-left:6px; }
        .undo-btn:active { color:var(--danger); }

        /* Import */
        .import-section { background:var(--bg-card);border-radius:14px;padding:16px;margin-bottom:16px;text-align:center; }
        .import-section .import-label { color:var(--text-muted);font-size:0.75rem;margin-bottom:8px; }
        .btn-import { padding:10px 20px;background:var(--bg-input);border:2px dashed var(--border);border-radius:12px;color:var(--text-muted);font-size:0.85rem;cursor:pointer;width:100%; }
        .btn-import:active { border-color:var(--accent);color:var(--accent); }
        .import-hidden { display:none; }
        .import-preview { background:var(--bg-card);border-radius:14px;padding:16px;margin-bottom:16px; }
        .import-preview h3 { color:var(--accent);font-size:0.95rem;margin-bottom:10px; }
        .preview-item { display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bg-input);font-size:0.75rem; }
        .preview-item:last-child { border-bottom:none; }
        .pi-desc { color:var(--text);flex:1; }
        .pi-cat { padding:2px 6px;border-radius:12px;font-size:0.6rem;background:var(--bg-input);color:var(--accent);margin:0 6px; }
        .pi-amt { color:var(--danger);font-weight:600;min-width:55px;text-align:right; }
        .import-summary { margin-top:10px;padding-top:10px;border-top:1px solid var(--bg-input);display:flex;justify-content:space-between;font-size:0.8rem; }
        .import-actions { display:flex;gap:10px;margin-top:12px; }
        .import-actions button { flex:1;padding:11px;border:none;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer; }

        /* Misc */
        .section-title { color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:16px; }
        .period-info { display:flex;justify-content:space-between;align-items:center;background:var(--bg-card);border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:0.85rem; }
        .period-info .total { color:var(--accent);font-weight:700;font-size:1rem; }
        .btn-reset { padding:6px 12px;background:var(--danger);color:#fff;border:none;border-radius:8px;font-size:0.75rem;cursor:pointer; }
        .rollover-info { background:var(--bg-card);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:0.75rem;color:var(--text-muted);border-left:3px solid var(--accent); }
        .rollover-info span { color:var(--accent);font-weight:600; }
        .overflow-notice { background:rgba(231,76,60,.1);border:1px solid var(--danger);border-radius:10px;padding:10px;margin-bottom:14px;font-size:0.8rem;color:var(--danger);text-align:center; }
        .paycheck-section { background:var(--bg-card);border-radius:16px;padding:20px;margin-bottom:16px;text-align:center; }
        .paycheck-section label { display:block;color:var(--text-muted);font-size:0.8rem;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px; }
        .paycheck-input-row { display:flex;gap:10px;align-items:center;justify-content:center; }
        .paycheck-input-row input { width:140px;padding:10px 14px;font-size:1.4rem;background:var(--bg-input);border:2px solid var(--accent);border-radius:12px;color:var(--text);text-align:center;outline:none; }
        .btn-allocate { padding:10px 20px;background:var(--accent);color:var(--bg-primary);border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer; }
        .btn-allocate:active { transform:scale(0.95); }
        .no-budget { text-align:center;padding:50px 20px;color:var(--text-dim); }
        .no-budget p { margin-top:8px;font-size:0.85rem; }
        .empty-state { text-align:center;padding:30px 20px;color:var(--text-dim);font-size:0.85rem; }
        .period-item { background:var(--bg-card);border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;font-size:0.8rem; }
        .period-item .period-label { color:var(--text-muted); }
        .saved { color:var(--accent);font-weight:600; }
        .over { color:var(--danger);font-weight:600; }
        .streak-bar { background:var(--bg-card);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:0.8rem; }
        .streak-bar .fire { font-size:1.2rem; }
        .streak-bar .streak-num { color:var(--accent);font-weight:700; }

        /* Gamification */
        .xp-bar-section { background:var(--bg-card);border-radius:14px;padding:14px 16px;margin-bottom:14px; }
        .xp-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:8px; }
        .xp-level { display:flex;align-items:center;gap:8px; }
        .xp-level .lvl-badge { width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:700;color:var(--bg-primary); }
        .xp-level .lvl-text { font-size:0.8rem;color:var(--text-muted); }
        .xp-level .lvl-text strong { color:var(--text);font-size:0.9rem; }
        .xp-amount { font-size:0.75rem;color:var(--accent); }
        .xp-track { height:8px;background:var(--bg-input);border-radius:4px;overflow:hidden; }
        .xp-fill { height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-hover));border-radius:4px;transition:width .5s ease; }

        .combo-badge { background:linear-gradient(135deg,#f39c12,#e74c3c);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:0.85rem;font-weight:600;color:#fff; }
        .combo-badge .combo-x { font-size:1.3rem;font-weight:800; }

        .daily-challenge { background:var(--bg-card);border-radius:14px;padding:14px 16px;margin-bottom:14px;border-left:4px solid var(--warning); }
        .daily-challenge .dc-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:6px; }
        .daily-challenge .dc-title { font-size:0.75rem;color:var(--warning);text-transform:uppercase;letter-spacing:.5px;font-weight:600; }
        .daily-challenge .dc-xp { font-size:0.7rem;color:var(--accent);background:rgba(0,212,170,.1);padding:2px 8px;border-radius:10px; }
        .daily-challenge .dc-desc { font-size:0.9rem;color:var(--text); }
        .daily-challenge .dc-progress { margin-top:8px;display:flex;align-items:center;gap:8px; }
        .daily-challenge .dc-prog-bar { flex:1;height:6px;background:var(--bg-input);border-radius:3px;overflow:hidden; }
        .daily-challenge .dc-prog-fill { height:100%;background:var(--warning);border-radius:3px;transition:width .3s; }
        .daily-challenge .dc-prog-text { font-size:0.7rem;color:var(--text-dim); }
        .daily-challenge.completed { border-left-color:var(--accent); }
        .daily-challenge.completed .dc-title { color:var(--accent); }
        .daily-challenge.completed .dc-prog-fill { background:var(--accent); }

        .achievements-section { background:var(--bg-card);border-radius:14px;padding:14px 16px;margin-bottom:14px; }
        .achievements-section h4 { font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px; }
        .badge-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:8px; }
        .achievement-badge { text-align:center;padding:8px 4px;border-radius:10px;background:var(--bg-input); }
        .achievement-badge.unlocked { background:rgba(0,212,170,.1);border:1px solid var(--accent); }
        .achievement-badge .ab-icon { font-size:1.4rem;display:block;margin-bottom:2px; }
        .achievement-badge .ab-name { font-size:0.55rem;color:var(--text-dim);line-height:1.2; }
        .achievement-badge.unlocked .ab-name { color:var(--accent); }
        .achievement-badge.locked .ab-icon { filter:grayscale(1) opacity(0.3); }

        .records-section { background:var(--bg-card);border-radius:14px;padding:14px 16px;margin-bottom:14px; }
        .records-section h4 { font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px; }
        .record-item { display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bg-input);font-size:0.8rem; }
        .record-item:last-child { border-bottom:none; }
        .record-item .rec-val { color:var(--accent);font-weight:600; }

        /* Confetti */
        .confetti-container { position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:2000;overflow:hidden; }
        .confetti-piece { position:absolute;width:10px;height:10px;top:-10px;animation:confettiFall 3s ease-out forwards; }
        @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1;} 100%{transform:translateY(100vh) rotate(720deg);opacity:0;} }

        .levelup-toast { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg-card);border:2px solid var(--accent);border-radius:20px;padding:30px;text-align:center;z-index:2001;animation:popIn .4s ease; }
        .levelup-toast .lu-icon { font-size:3rem;margin-bottom:8px; }
        .levelup-toast .lu-text { font-size:1.2rem;font-weight:700;color:var(--accent); }
        .levelup-toast .lu-sub { font-size:0.8rem;color:var(--text-muted);margin-top:4px; }
        @keyframes popIn { 0%{transform:translate(-50%,-50%) scale(0);} 50%{transform:translate(-50%,-50%) scale(1.1);} 100%{transform:translate(-50%,-50%) scale(1);} }

        /* Settings */
        .settings-section { margin-bottom:16px; }
        .settings-section h3 { color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px; }
        .cat-edit-item { background:var(--bg-card);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px; }
        .cat-edit-item .cei-color { width:12px;height:12px;border-radius:50%;flex-shrink:0; }
        .cat-edit-item .cei-info { flex:1; }
        .cat-edit-item .cei-name { font-size:0.85rem;font-weight:500; }
        .cat-edit-item .cei-type { font-size:0.65rem;color:var(--text-dim);text-transform:uppercase; }
        .cat-edit-item .cei-pct { width:60px;padding:6px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.85rem;text-align:center;outline:none; }
        .cat-edit-item .cei-pct:focus { border-color:var(--accent); }
        .cat-edit-item .cei-del { background:none;border:none;color:var(--danger);font-size:1.1rem;cursor:pointer;padding:4px 8px; }
        .cat-edit-item .cei-del:active { transform:scale(0.8); }
        .pct-total { text-align:center;font-size:0.85rem;padding:10px;border-radius:10px;margin-bottom:12px; }
        .pct-total.ok { background:rgba(0,212,170,0.1);color:var(--accent); }
        .pct-total.bad { background:rgba(231,76,60,0.1);color:var(--danger); }
        .btn-add-cat { width:100%;padding:12px;background:var(--bg-card);border:2px dashed var(--border);border-radius:12px;color:var(--text-muted);font-size:0.85rem;cursor:pointer;margin-bottom:12px; }
        .btn-add-cat:active { border-color:var(--accent);color:var(--accent); }
        .btn-save-cats { width:100%;padding:12px;background:var(--accent);color:var(--bg-primary);border:none;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer; }
        .btn-save-cats:active { transform:scale(0.97); }
        .btn-save-cats:disabled { opacity:0.5;cursor:not-allowed; }
        .add-cat-form { background:var(--bg-card);border-radius:14px;padding:16px;margin-bottom:12px; }
        .add-cat-form h4 { color:var(--accent);font-size:0.9rem;margin-bottom:12px; }
        .acf-row { display:flex;gap:8px;margin-bottom:8px; }
        .acf-row input, .acf-row select { flex:1;padding:10px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.85rem;outline:none; }
        .acf-row input:focus, .acf-row select:focus { border-color:var(--accent); }
        .acf-row select { appearance:none; }
        .acf-buttons { display:flex;gap:8px; }
        .acf-buttons button { flex:1;padding:10px;border:none;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer; }
    </style>
</head>
<body>
    <div class="header"><h1>💰 PayDay</h1><div class="header-right"><button class="btn-icon" onclick="openThemeModal()">🎨</button></div></div>
    <div id="app"></div>
    <button class="fab" id="fabBtn" onclick="openQuickPanel()">+</button>
    <div class="quick-panel" id="quickPanel">
        <div class="qp-header"><h3>Quick Log</h3><button class="qp-close" onclick="closeQuickPanel()">×</button></div>
        <div id="qpContent"></div>
    </div>
    <nav class="bottom-nav">
        <button class="nav-item active" data-tab="home" onclick="switchTab('home')"><span class="nav-icon">🏠</span>Home</button>
        <button class="nav-item" data-tab="budget" onclick="switchTab('budget')"><span class="nav-icon">💳</span>Budget</button>
        <button class="nav-item" data-tab="history" onclick="switchTab('history')"><span class="nav-icon">📋</span>History</button>
        <button class="nav-item" data-tab="settings" onclick="switchTab('settings')"><span class="nav-icon">⚙️</span>Settings</button>
    </nav>
    <input type="file" id="csvFileInput" class="import-hidden" accept=".csv" onchange="handleCSVFile(event)">
    <div class="modal-overlay" id="spendModal"><div class="modal">
        <h3 id="modalTitle">Log Spending</h3>
        <input type="number" id="spendAmount" placeholder="0.00" step="0.01" inputmode="decimal">
        <input type="text" class="note-input" id="spendNote" placeholder="What was it? (optional)" spellcheck="true" autocomplete="on" autocorrect="on" autocapitalize="sentences">
        <div class="warning-msg" id="spendWarning"></div>
        <div class="modal-buttons"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-confirm" onclick="confirmSpend()">Log It</button></div>
    </div></div>
    <div class="modal-overlay" id="themeModal"><div class="modal">
        <h3>🎨 Choose Theme</h3>
        <div class="theme-grid">
            <div class="theme-swatch" data-t="default" onclick="setTheme('default')">Default</div>
            <div class="theme-swatch" data-t="ocean" onclick="setTheme('ocean')">Ocean</div>
            <div class="theme-swatch" data-t="purple" onclick="setTheme('purple')">Purple</div>
            <div class="theme-swatch" data-t="orange" onclick="setTheme('orange')">Ember</div>
            <div class="theme-swatch" data-t="light" onclick="setTheme('light')">Light</div>
        </div>
        <div class="modal-buttons"><button class="btn-cancel" onclick="closeThemeModal()">Close</button></div>
    </div></div>
    <script>
        const DEFAULT_CATEGORIES=[
            {id:'rent',name:'🏠 Rent Fund',pct:0.19,type:'protected',quickAdds:[],color:'#3498db'},
            {id:'car',name:'🚗 Car & Gas',pct:0.09,type:'protected',quickAdds:['$20 Gas','$60 Fill Up'],color:'#1abc9c'},
            {id:'food',name:'🍔 Food',pct:0.24,type:'flexible',quickAdds:['$6 Dutch Bros','$15 Combo','$25 McDs','$2.40 Vending'],color:'#f39c12'},
            {id:'subs',name:'📱 Subs',pct:0.04,type:'protected',quickAdds:['$22 Spotify','$16 YouTube','$5 Prime'],color:'#9b59b6'},
            {id:'savings',name:'💎 Goals Fund',pct:0.12,type:'protected',quickAdds:[],color:'#2ecc71'},
            {id:'gaming',name:'🎮 Gaming',pct:0.18,type:'fun',quickAdds:['$20 Star Citizen','$10 Mobile','$50 Cards'],color:'#e74c3c'},
            {id:'free',name:'🎯 Free',pct:0.14,type:'fun',quickAdds:['$10','$20','$50'],color:'#e67e22'},
        ];
        let CATEGORIES=loadCategories();
        function loadCategories(){const s=localStorage.getItem('payday_cats');return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));}
        function saveCategories(){localStorage.setItem('payday_cats',JSON.stringify(CATEGORIES));}
        const FUN_IDS_FUNC=()=>CATEGORIES.filter(c=>c.type==='fun').map(c=>c.id);
        let currentTab='home',historyFilter='all',csvPreviewData=null;
        let state=loadState();
        function loadState(){const s=localStorage.getItem('payday_v3');return s?JSON.parse(s):{active:false,paycheck:0,allocations:{},spent:{},history:[],streak:0,lastCleanDay:null,periodHistory:[],rollover:0,totalSaved:0,goal:500,xp:0,level:1,badges:[],bestStreak:0,bestScore:0,combo:0,lastLogDate:null,challengeDate:null,challengeId:null,challengeDone:false,goals:[]};}
        function saveState(){localStorage.setItem('payday_v3',JSON.stringify(state));}

        // === SAVINGS GOALS ===
        let showGoalForm=false;
        let goalFundTarget=null;

        function addGoal(name,target,emoji){
            if(!state.goals)state.goals=[];
            state.goals.push({id:'goal_'+Date.now(),name,target:parseFloat(target),saved:0,emoji:emoji||'🎯',complete:false,dateCreated:new Date().toLocaleDateString()});
            saveState();render();
        }

        function fundGoal(goalId,amount){
            const g=(state.goals||[]).find(x=>x.id===goalId);if(!g)return;
            g.saved=Math.min(g.target,Math.round((g.saved+amount)*100)/100);
            if(g.saved>=g.target&&!g.complete){g.complete=true;showConfetti();addXP(30);}
            saveState();render();
        }

        function deleteGoal(goalId){
            if(!confirm('Delete this goal?'))return;
            state.goals=(state.goals||[]).filter(g=>g.id!==goalId);
            saveState();render();
        }

        function markGoalBought(goalId){
            if(!confirm('Purchased! Remove this goal?'))return;
            state.goals=(state.goals||[]).filter(g=>g.id!==goalId);
            addXP(20);showConfetti();saveState();render();
        }

        // === GAMIFICATION ===
        const XP_PER_LEVEL=100;
        const XP_REWARDS={log:5,underBudget:15,streakDay:10,challenge:25,periodClean:50};
        const ACHIEVEMENTS=[
            {id:'first_log',name:'First Step',icon:'👣',desc:'Log your first purchase',check:s=>s.history.length>=1},
            {id:'streak3',name:'3-Day Streak',icon:'🔥',desc:'3 days without overspending',check:s=>s.bestStreak>=3},
            {id:'streak7',name:'Week Warrior',icon:'⚔️',desc:'7-day streak',check:s=>s.bestStreak>=7},
            {id:'streak14',name:'Fortnight',icon:'🏰',desc:'14-day streak',check:s=>s.bestStreak>=14},
            {id:'streak30',name:'Monthly Master',icon:'👑',desc:'30-day streak',check:s=>s.bestStreak>=30},
            {id:'under_budget',name:'Under Budget',icon:'💪',desc:'Finish a period under budget',check:s=>s.periodHistory.some(p=>p.leftover>0)},
            {id:'level5',name:'Level 5',icon:'⭐',desc:'Reach level 5',check:s=>s.level>=5},
            {id:'level10',name:'Level 10',icon:'🌟',desc:'Reach level 10',check:s=>s.level>=10},
            {id:'saved100',name:'$100 Saved',icon:'🐷',desc:'Save $100 total',check:s=>(s.totalSaved||0)>=100},
            {id:'saved500',name:'$500 Saved',icon:'🏦',desc:'Reach savings goal',check:s=>(s.totalSaved||0)>=500},
            {id:'log50',name:'Logger',icon:'📝',desc:'Log 50 transactions',check:s=>s.history.length>=50},
            {id:'combo5',name:'Combo x5',icon:'⚡',desc:'Hit 5-day combo',check:s=>(s.bestStreak||0)>=5},
        ];
        const DAILY_CHALLENGES=[
            {id:'spend_under_30',desc:'Spend under $30 today',check:(s)=>getDailyTotal()<30&&s.history.some(h=>new Date(h.time).toDateString()===new Date().toDateString()),xp:25},
            {id:'spend_under_20',desc:'Spend under $20 today',check:(s)=>getDailyTotal()<20&&s.history.some(h=>new Date(h.time).toDateString()===new Date().toDateString()),xp:30},
            {id:'no_food_out',desc:'No fast food today',check:(s)=>{const today=new Date().toDateString();const foodToday=s.history.filter(h=>h.cat==='food'&&new Date(h.time).toDateString()===today);return foodToday.length===0&&s.history.some(h=>new Date(h.time).toDateString()===today);},xp:35},
            {id:'log_3',desc:'Log 3+ purchases today',check:(s)=>{const today=new Date().toDateString();return s.history.filter(h=>new Date(h.time).toDateString()===today).length>=3;},xp:15},
            {id:'no_gaming',desc:'No gaming purchases today',check:(s)=>{const today=new Date().toDateString();return s.history.filter(h=>h.cat==='gaming'&&new Date(h.time).toDateString()===today).length===0&&s.history.some(h=>new Date(h.time).toDateString()===today);},xp:20},
            {id:'under_50',desc:'Keep total under $50 today',check:(s)=>getDailyTotal()<50&&s.history.some(h=>new Date(h.time).toDateString()===new Date().toDateString()),xp:20},
        ];

        function getDailyChallenge(){
            const today=new Date().toDateString();
            if(state.challengeDate===today&&state.challengeId)return DAILY_CHALLENGES.find(c=>c.id===state.challengeId)||DAILY_CHALLENGES[0];
            // Pick random challenge
            const idx=new Date().getDate()%DAILY_CHALLENGES.length;
            state.challengeId=DAILY_CHALLENGES[idx].id;
            state.challengeDate=today;
            state.challengeDone=false;
            saveState();
            return DAILY_CHALLENGES[idx];
        }

        function addXP(amount){
            const oldLevel=state.level;
            state.xp=(state.xp||0)+amount;
            state.level=Math.floor(state.xp/XP_PER_LEVEL)+1;
            if(state.level>oldLevel)showLevelUp(state.level);
            checkBadges();
            saveState();
        }

        function checkBadges(){
            let newBadge=false;
            ACHIEVEMENTS.forEach(a=>{
                if(!(state.badges||[]).includes(a.id)&&a.check(state)){
                    state.badges=state.badges||[];state.badges.push(a.id);
                    newBadge=true;
                }
            });
            if(newBadge)showConfetti();
        }

        function updateCombo(){
            const today=new Date().toDateString();
            if(state.lastLogDate===today)return; // Already counted today
            if(state.lastLogDate){
                const last=new Date(state.lastLogDate);const now=new Date(today);
                const diff=(now-last)/(1000*60*60*24);
                if(diff<=1)state.combo=(state.combo||0)+1;
                else state.combo=1;
            }else{state.combo=1;}
            state.lastLogDate=today;
            if(state.combo>(state.bestStreak||0))state.bestStreak=state.combo;
        }

        function checkDailyChallenge(){
            const ch=getDailyChallenge();
            if(!state.challengeDone&&ch.check(state)){
                state.challengeDone=true;
                addXP(ch.xp);
                saveState();
            }
        }

        function showConfetti(){
            const container=document.createElement('div');container.className='confetti-container';
            const colors=['#00d4aa','#f39c12','#e74c3c','#3498db','#9b59b6','#2ecc71'];
            for(let i=0;i<40;i++){
                const piece=document.createElement('div');piece.className='confetti-piece';
                piece.style.left=Math.random()*100+'%';piece.style.background=colors[Math.floor(Math.random()*colors.length)];
                piece.style.animationDelay=Math.random()*0.5+'s';piece.style.borderRadius=Math.random()>0.5?'50%':'0';
                piece.style.width=(Math.random()*8+6)+'px';piece.style.height=(Math.random()*8+6)+'px';
                container.appendChild(piece);
            }
            document.body.appendChild(container);setTimeout(()=>container.remove(),3500);
        }

        function showLevelUp(lvl){
            showConfetti();
            const toast=document.createElement('div');toast.className='levelup-toast';
            toast.innerHTML=`<div class="lu-icon">⬆️</div><div class="lu-text">Level ${lvl}!</div><div class="lu-sub">Keep going!</div>`;
            document.body.appendChild(toast);setTimeout(()=>toast.remove(),2500);
        }

        // Theme
        function loadTheme(){const t=localStorage.getItem('payday_theme')||'default';if(t==='default')document.body.removeAttribute('data-theme');else document.body.setAttribute('data-theme',t);document.querySelectorAll('.theme-swatch').forEach(s=>s.classList.toggle('active',s.dataset.t===t));}
        function setTheme(t){localStorage.setItem('payday_theme',t);loadTheme();}
        function openThemeModal(){document.getElementById('themeModal').classList.add('active');}
        function closeThemeModal(){document.getElementById('themeModal').classList.remove('active');}
        document.getElementById('themeModal').addEventListener('click',e=>{if(e.target.id==='themeModal')closeThemeModal();});
        loadTheme();

        // Tab Nav
        function switchTab(t){currentTab=t;document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.tab===t));render();}

        // Quick Panel
        function openQuickPanel(){if(!state.active)return;renderQuickPanel();document.getElementById('quickPanel').classList.add('open');document.getElementById('fabBtn').style.display='none';}
        function closeQuickPanel(){document.getElementById('quickPanel').classList.remove('open');document.getElementById('fabBtn').style.display='flex';}
        function renderQuickPanel(){
            let h='';
            // Recent favorites
            const recents=getRecentFavorites();
            if(recents.length>0){h+='<div style="margin-bottom:12px;font-size:0.75rem;color:var(--text-muted)">LOG AGAIN</div><div class="qp-favorites">';
                recents.forEach(r=>{h+=`<button class="qp-fav-btn" onclick="quickLog('${r.cat}',${r.amount},'${r.note.replace(/'/g,"\\'")}')"><span class="fav-amt">$${r.amount.toFixed(0)}</span><span>${r.note.substring(0,12)}</span></button>`;});
                h+='</div>';}
            // Category buttons
            h+='<div style="margin-bottom:8px;font-size:0.75rem;color:var(--text-muted)">OR PICK CATEGORY</div><div class="qp-cats">';

        function distributeToGoal(goalId,amount){
            if(amount<=0)return;
            const available=getGoalsPoolRemaining();
            const actual=Math.min(amount,available);
            if(actual<=0){alert('No funds left in Goals pool this period.');return;}
            const g=(state.goals||[]).find(x=>x.id===goalId);if(!g)return;
            g.saved=Math.round((g.saved+actual)*100)/100;
            state.spent['savings']=(state.spent['savings']||0)+actual;
            if(g.saved>=g.target&&!g.complete){g.complete=true;showConfetti();addXP(30);}
            saveState();render();
        }

        function getGoalsPoolRemaining(){
            const pool=state.goalsPool||0;
            const spent=state.spent['savings']||0;
            return Math.round((pool-spent)*100)/100;
        }
        function savePeriodHistory(){
            // Auto-distribute undistributed Goals Fund to active goals
            const poolLeft=getGoalsPoolRemaining();
            if(poolLeft>0){
                const activeGoals=(state.goals||[]).filter(g=>!g.complete);
                if(activeGoals.length>0){
                    const perGoal=Math.round((poolLeft/activeGoals.length)*100)/100;
                    activeGoals.forEach(g=>{
                        g.saved=Math.round((g.saved+perGoal)*100)/100;
                        if(g.saved>=g.target&&!g.complete){g.complete=true;}
                    });
                    state.spent['savings']=(state.spent['savings']||0)+poolLeft;
                }
            }
            const ts=Object.values(state.spent).reduce((s,v)=>s+v,0);
            const lo=Math.round((state.paycheck-ts)*100)/100;
            state.periodHistory.unshift({paycheck:state.paycheck,spent:Math.round(ts*100)/100,leftover:lo,date:new Date().toLocaleDateString()});
            if(state.periodHistory.length>20)state.periodHistory.pop();
            let ro=0;FUN_IDS_FUNC().forEach(id=>{const r=getAdjustedRemaining(id);if(r>0)ro+=r;});
            state.rollover=Math.round(ro*100)/100;
            // Track savings goal
            const savedThisPeriod=state.spent['savings']||0;
            state.totalSaved=(state.totalSaved||0)+savedThisPeriod;
            // Track best score
            const score=getHealthScore();
            if(score>(state.bestScore||0))state.bestScore=score;
            // Award XP for finishing under budget
            if(lo>0)addXP(XP_REWARDS.periodClean);

        function getRemaining(id){return Math.round((state.allocations[id]-state.spent[id])*100)/100;}

        function getAdjustedRemaining(id){
            const cat=CATEGORIES.find(c=>c.id===id);let rem=getRemaining(id);
            if(cat.type==='fun'){const ov=getTotalOverage();if(ov>0){const t=FUN_IDS_FUNC().reduce((s,i)=>s+state.allocations[i],0);rem-=Math.round(ov*(state.allocations[id]/t)*100)/100;}}
            return Math.round(rem*100)/100;

        function getDailyTotal(){const t=new Date().toDateString();return state.history.filter(h=>new Date(h.time).toDateString()===t).reduce((s,h)=>s+h.amount,0);}
        function getTotalSpent(){return Object.values(state.spent).reduce((s,v)=>s+v,0);}

            const t=new Date().toDateString();
            const anyO=CATEGORIES.some(c=>(c.type==='fun'?getAdjustedRemaining(c.id):getRemaining(c.id))<0);
            if(!anyO){if(state.lastCleanDay!==t){state.streak=(state.streak||0)+1;state.lastCleanDay=t;}}

        function getHealthScore(){

            const overCats=CATEGORIES.filter(c=>(c.type==='fun'?getAdjustedRemaining(c.id):getRemaining(c.id))<0).length;
            score-=overCats*10;
            score+=Math.min(state.streak||0,5)*4;

        function parseCSV(text){

        }

        function renderHeatCal(){
            if(state.history.length===0)return '';
            const dayData={};
            state.history.forEach(h=>{const d=new Date(h.time).toLocaleDateString();dayData[d]=(dayData[d]||0)+h.amount;});
            // Show last 14 days
            const today=new Date();
            let h='<div class="heatcal-section"><h4>Spending Heat Map</h4>';
            h+='<div class="heat-labels"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>';
            h+='<div class="heat-grid">';
            // Start from 13 days ago
            const start=new Date(today);start.setDate(start.getDate()-13);
            // Pad to start on Sunday
            const padDays=start.getDay();
            for(let i=0;i<padDays;i++)h+='<div class="heat-day empty"></div>';
            for(let i=0;i<14;i++){
                const d=new Date(start);d.setDate(d.getDate()+i);
                const key=d.toLocaleDateString();const amt=dayData[key]||0;
                const dayNum=d.getDate();
                let lv='lv0';if(amt>80)lv='lv3';else if(amt>40)lv='lv2';else if(amt>0)lv='lv1';
                h+=`<div class="heat-day ${lv}" title="$${amt.toFixed(0)}">${dayNum}</div>`;
            }
            h+='</div></div>';
            return h;
        }

        function renderWeeklyReport(){
            if(state.history.length<3)return '';
            const now=Date.now();const weekAgo=now-7*24*60*60*1000;
            const thisWeek=state.history.filter(h=>h.time>=weekAgo);
            if(thisWeek.length===0)return '';
            const total=thisWeek.reduce((s,h)=>s+h.amount,0);
            const catTotals={};thisWeek.forEach(h=>{catTotals[h.cat]=(catTotals[h.cat]||0)+h.amount;});
            const topCat=Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
            const topCatObj=CATEGORIES.find(c=>c.id===topCat[0]);
            const avgDay=total/7;
            let h=`<div class="weekly-card"><h4>📊 This Week</h4>`;
            h+=`<div class="wr-stat"><span>Total spent</span><span class="wr-val" style="color:var(--danger)">$${total.toFixed(0)}</span></div>`;
            h+=`<div class="wr-stat"><span>Avg/day</span><span class="wr-val">$${avgDay.toFixed(0)}</span></div>`;
            h+=`<div class="wr-stat"><span>Biggest category</span><span class="wr-val">${topCatObj?topCatObj.name:topCat[0]} ($${topCat[1].toFixed(0)})</span></div>`;
            h+=`<div class="wr-stat"><span>Transactions</span><span class="wr-val">${thisWeek.length}</span></div>`;
            h+='</div>';
            return h;
        }

        function renderGoal(){
            const goals=state.goals||[];
            const poolRemaining=state.active?getGoalsPoolRemaining():0;
            const poolTotal=state.goalsPool||0;

            let h='<div class="section-title">🎯 Savings Goals</div>';

            // Pool info (only when a period is active)
            if(state.active){
                const poolPct=poolTotal>0?Math.round(((poolTotal-poolRemaining)/poolTotal)*100):0;
                h+=`<div class="goal-section"><h4>Goals Fund This Period</h4>
                    <div class="gc-bar"><div class="gc-fill inprogress" style="width:${poolPct}%"></div></div>
                    <div class="gc-info"><span>$${(poolTotal-poolRemaining).toFixed(2)} distributed</span><span style="color:var(--accent);font-weight:600">$${poolRemaining.toFixed(2)} available</span></div></div>`;
            }

            // Add form
            if(showGoalForm){
                h+=`<div class="add-goal-form"><h4>New Goal</h4>
                    <div class="agf-row"><input type="text" id="newGoalName" placeholder="What are you saving for?"><input type="text" id="newGoalEmoji" placeholder="🎯" style="width:50px;flex:none;text-align:center"></div>
                    <div class="agf-row"><input type="number" id="newGoalTarget" placeholder="Target $" inputmode="decimal"></div>
                    <div class="agf-buttons"><button class="btn-cancel" onclick="showGoalForm=false;render()">Cancel</button><button class="btn-confirm" onclick="handleAddGoal()">Add Goal</button></div></div>`;
            }else{
                h+=`<button class="btn-add-goal" onclick="showGoalForm=true;render()">+ Add Goal</button>`;
            }

            if(goals.length===0)return h+`<div style="text-align:center;color:var(--text-dim);font-size:0.8rem;padding:12px">Add goals for things you want to save up for!</div>`;

            // Goal cards
            h+='<div class="goals-list">';
            const sorted=[...goals.filter(g=>!g.complete),...goals.filter(g=>g.complete)];
            sorted.forEach(g=>{
                const pct=Math.min(100,Math.round((g.saved/g.target)*100));
                const remaining=Math.max(0,g.target-g.saved);
                h+=`<div class="goal-card ${g.complete?'complete':''}">
                    ${g.complete?'<div class="gc-complete-badge">✅</div>':''}
                    <div class="gc-header"><span class="gc-name">${g.emoji} ${g.name}</span><span class="gc-pct">${pct}%</span></div>
                    <div class="gc-bar"><div class="gc-fill ${g.complete?'complete':'inprogress'}" style="width:${pct}%"></div></div>
                    <div class="gc-info"><span>$${g.saved.toFixed(2)} / $${g.target.toFixed(2)}</span><span>${g.complete?'🎉 Ready!':'$'+remaining.toFixed(2)+' to go'}</span></div>
                    <div class="gc-actions">
                        ${g.complete?`<button class="gc-btn buy-now" onclick="markGoalBought('${g.id}')">🛒 Bought It!</button>`:`<button class="gc-btn add-funds" onclick="openGoalFundModal('${g.id}')">+ Fund</button>`}
                        <button class="gc-btn delete" onclick="deleteGoal('${g.id}')">🗑</button>
                    </div>
                </div>`;
            });
            h+='</div>';
            return h;
        }

        function handleAddGoal(){
            const name=document.getElementById('newGoalName').value.trim();
            const emoji=document.getElementById('newGoalEmoji').value.trim()||'🎯';
            const target=parseFloat(document.getElementById('newGoalTarget').value);
            if(!name||!target||target<=0){alert('Enter a name and target amount.');return;}
            addGoal(name,target,emoji);
            showGoalForm=false;render();
        }

        function openGoalFundModal(goalId){
            goalFundTarget=goalId;
            const g=(state.goals||[]).find(x=>x.id===goalId);
            const avail=getGoalsPoolRemaining();
            document.getElementById('modalTitle').textContent='Fund: '+g.emoji+' '+g.name;
            document.getElementById('spendAmount').value='';
            document.getElementById('spendNote').value='';
            document.getElementById('spendNote').placeholder=`Available: $${avail.toFixed(2)}`;
            document.getElementById('spendWarning').classList.remove('show','confirmed');
            document.getElementById('spendModal').classList.add('active');
            setTimeout(()=>document.getElementById('spendAmount').focus(),100);
            currentSpendCat='__goal__';
        }

        // === RENDER: BUDGET TAB ===
        function renderBudget(){
            if(!state.active)return `<div class="paycheck-section"><label>Enter Paycheck</label><div class="paycheck-input-row"><input type="number" id="paycheckInput" placeholder="850" step="0.01" inputmode="decimal"><button class="btn-allocate" onclick="handleAllocate()">Go</button></div></div><div class="no-budget"><p>Start a period to budget.</p></div>`;
            const ov=getTotalOverage();
            let h=`<div class="period-info"><div><span style="color:var(--text-muted)">Check:</span> <span class="total">$${state.paycheck.toFixed(2)}</span></div><button class="btn-reset" onclick="resetBudget()">New Period</button></div>`;
            if(ov>0)h+=`<div class="overflow-notice">⚠️ $${ov.toFixed(2)} over — pulling from fun.</div>`;
            h+='<div class="categories">';
            CATEGORIES.forEach(cat=>{
                const alloc=state.allocations[cat.id],spent=state.spent[cat.id];
                const rem=cat.type==='fun'?getAdjustedRemaining(cat.id):getRemaining(cat.id);
                const pct=Math.max(0,(rem/alloc)*100);let col='good',rc='';
                if(rem<0){col='danger';rc='danger';}else if(rem<alloc*.25){col='warning';rc='warning';}
                h+=`<div class="category-card ${cat.type} ${rem<0?'overspent':''}">
                    <div class="card-header"><span class="name">${cat.name}</span><span class="badge ${cat.type}">${cat.type}</span></div>
                    <div class="ring-row"><div class="ring-container">${renderRing(pct,col)}<span class="ring-text">${Math.round(pct)}%</span></div>
                    <div class="ring-amounts"><div class="remaining ${rc}">$${rem.toFixed(2)}</div><div class="allocated">of $${alloc.toFixed(2)} (spent $${spent.toFixed(2)})</div></div></div>`;
                // Quick adds
                if(cat.quickAdds.length>0){h+='<div class="quick-adds">';cat.quickAdds.forEach(qa=>{const m=qa.match(/\$(\d+\.?\d*)\s*(.*)/);if(m){const a=parseFloat(m[1]),l=m[2]||'$'+a;h+=`<button class="btn-quick" onclick="openSpendModal('${cat.id}',${a},'${l.replace(/'/g,"\\'")}')">${qa}</button>`;}});h+='</div>';}
                h+=`<button class="btn-spend" onclick="openSpendModal('${cat.id}')">+ Log Spending</button></div>`;
            });
            h+='</div>';
            return h;
        }

        // === RENDER: HISTORY TAB ===
        function renderHistory(){
            let h=`<div class="import-section"><div class="import-label">Import from SoFi CSV</div><button class="btn-import" onclick="triggerCSVImport()">📂 Upload CSV</button></div>`;
            if(csvPrev&&csvPrev.length>0){
                const cnt=csvPrev.length,tot=csvPrev.reduce((s,t)=>s+t.amount,0);
                h+=`<div class="import-preview"><h3>Preview (${cnt} transactions)</h3>`;
                csvPrev.slice(0,25).forEach(t=>{const co=CATEGORIES.find(c=>c.id===t.cat);h+=`<div class="preview-item"><span class="pi-desc">${t.label}</span><span class="pi-cat">${co?co.name.split(' ')[0]:'?'}</span><span class="pi-amt">-$${t.amount.toFixed(2)}</span></div>`;});
                if(cnt>25)h+=`<div style="text-align:center;color:var(--text-dim);font-size:0.7rem;padding:6px">...+${cnt-25} more</div>`;
                h+=`<div class="import-summary"><span>${cnt} items</span><span style="color:var(--danger);font-weight:600">-$${tot.toFixed(2)}</span></div>`;
                h+=`<div class="import-actions"><button class="btn-cancel" onclick="cancelCSVImport()">Cancel</button><button class="btn-confirm" onclick="confirmCSVImport()">Import</button></div></div>`;
            }
            if(!state.history||state.history.length===0)return h+`<div class="empty-state">No transactions yet.</div>`;
            // Filters
            h+='<div class="history-filters">';
            h+=`<button class="filter-btn ${historyFilter==='all'?'active':''}" onclick="setFilter('all')">All</button>`;
            CATEGORIES.forEach(c=>{h+=`<button class="filter-btn ${historyFilter===c.id?'active':''}" onclick="setFilter('${c.id}')">${c.name.split(' ')[0]}</button>`;});
            h+='</div>';
            const filtered=historyFilter==='all'?state.history:state.history.filter(i=>i.cat===historyFilter);
            const totalF=filtered.reduce((s,i)=>s+i.amount,0);
            h+=`<div class="dash-card wide" style="margin-bottom:12px"><div class="dc-label">${historyFilter==='all'?'Total Spent':'Filtered'}</div><div class="dc-value danger">-$${totalF.toFixed(2)}</div><div class="dc-sub">${filtered.length} transactions</div></div>`;
            // Group by day
            const groups={};filtered.forEach(item=>{const day=new Date(item.time).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});if(!groups[day])groups[day]=[];groups[day].push(item);});
            Object.entries(groups).forEach(([day,items])=>{
                const dt=items.reduce((s,i)=>s+i.amount,0);
                h+=`<div class="section-title" style="display:flex;justify-content:space-between"><span>${day}</span><span>-$${dt.toFixed(2)}</span></div>`;
                items.forEach(item=>{const cat=CATEGORIES.find(c=>c.id===item.cat);const tm=new Date(item.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});const isFirst=(state.history[0]===item);
                    h+=`<div class="h-item"><div class="h-left"><div class="h-cat">${cat?cat.name:item.cat}</div>${item.note?`<div class="h-note">${item.note}</div>`:''}<div class="h-time">${tm}</div></div><div style="display:flex;align-items:center"><span class="h-amount">-$${item.amount.toFixed(2)}</span>${isFirst?`<button class="undo-btn" onclick="undoLast()">↩</button>`:''}</div></div>`;
                });
            });
            return h;
        }
        function setFilter(f){historyFilter=f;render();}

        // === RENDER: SETTINGS TAB ===
        let showAddForm=false;
        function renderSettings(){
            let h='<div class="settings-section"><h3>Manage Categories</h3>';
            // Total percentage check
            const totalPct=Math.round(CATEGORIES.reduce((s,c)=>s+c.pct,0)*100);
            const pctOk=totalPct===100;
            h+=`<div class="pct-total ${pctOk?'ok':'bad'}">Total: ${totalPct}% ${pctOk?'✓':'(must equal 100%)'}</div>`;
            // Category list
            CATEGORIES.forEach((cat,idx)=>{
                h+=`<div class="cat-edit-item">
                    <div class="cei-color" style="background:${cat.color}"></div>
                    <div class="cei-info"><div class="cei-name">${cat.name}</div><div class="cei-type">${cat.type}</div></div>
                    <input type="number" class="cei-pct" value="${Math.round(cat.pct*100)}" min="1" max="99" onchange="updateCatPct(${idx},this.value)">
                    <span style="color:var(--text-dim);font-size:0.8rem">%</span>
                    <button class="cei-del" onclick="deleteCat(${idx})">🗑</button>
                </div>`;
            });
            // Add button
            if(!showAddForm){
                h+=`<button class="btn-add-cat" onclick="showAddForm=true;render()">+ Add Category</button>`;
            }else{
                h+=`<div class="add-cat-form"><h4>New Category</h4>
                    <div class="acf-row"><input type="text" id="newCatName" placeholder="Name (e.g. Gym)"><input type="text" id="newCatEmoji" placeholder="Emoji" style="width:60px;flex:none;"></div>
                    <div class="acf-row"><input type="number" id="newCatPct" placeholder="%" min="1" max="50" style="width:70px;flex:none;">
                    <select id="newCatType"><option value="protected">Protected</option><option value="flexible">Flexible</option><option value="fun">Fun</option></select></div>
                    <div class="acf-buttons"><button class="btn-cancel" onclick="showAddForm=false;render()">Cancel</button><button class="btn-confirm" onclick="addNewCat()">Add</button></div>
                </div>`;
            }
            // Save & normalize button
            h+=`<button class="btn-save-cats" onclick="normalizeCats()" ${pctOk?'':''}>${pctOk?'✓ Categories Saved':'Auto-Fix to 100%'}</button>`;
            h+='</div>';
            // Data section
            h+=`<div class="settings-section"><h3>Data</h3>
                <button class="btn-add-cat" onclick="resetAllData()" style="color:var(--danger);border-color:var(--danger)">⚠️ Reset All Data</button></div>`;
            return h;
        }

        function updateCatPct(idx,val){
            const v=parseInt(val);if(isNaN(v)||v<1)return;
            CATEGORIES[idx].pct=v/100;
            saveCategories();render();
        }

        function deleteCat(idx){
            if(CATEGORIES.length<=2){alert("Need at least 2 categories.");return;}
            if(!confirm(`Delete "${CATEGORIES[idx].name}"?`))return;
            CATEGORIES.splice(idx,1);
            saveCategories();render();
        }

        function addNewCat(){
            const name=document.getElementById('newCatName').value.trim();
            const emoji=document.getElementById('newCatEmoji').value.trim()||'📌';
            const pct=parseInt(document.getElementById('newCatPct').value);
            const type=document.getElementById('newCatType').value;
            if(!name||!pct||pct<1)return alert('Fill in name and percentage.');
            const id=name.toLowerCase().replace(/[^a-z0-9]/g,'')+'_'+Date.now();
            const colors=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#fd79a8','#636e72'];
            const color=colors[CATEGORIES.length%colors.length];
            CATEGORIES.push({id,name:`${emoji} ${name}`,pct:pct/100,type,quickAdds:[],color});
            showAddForm=false;
            saveCategories();render();
        }

        function normalizeCats(){
            const total=CATEGORIES.reduce((s,c)=>s+c.pct,0);
            if(total===0)return;
            CATEGORIES.forEach(c=>{c.pct=Math.round((c.pct/total)*100)/100;});
            // Fix rounding to exactly 100%
            const diff=1-CATEGORIES.reduce((s,c)=>s+c.pct,0);
            if(diff!==0)CATEGORIES[CATEGORIES.length-1].pct+=diff;
            saveCategories();render();
        }

        function resetAllData(){if(!confirm('Delete ALL data? This cannot be undone.'))return;localStorage.removeItem('payday_v3');localStorage.removeItem('payday_cats');location.reload();}


        function renderPeriodHistory(){
            if(!state.periodHistory||state.periodHistory.length===0)return '';
            let h='<div class="section-title" style="margin-top:20px">Past Periods</div>';
            state.periodHistory.slice(0,8).forEach(p=>{const good=p.leftover>=0;
                h+=`<div class="period-item"><div class="period-label">${p.date} — $${p.paycheck.toFixed(0)}</div><div class="${good?'saved':'over'}">${good?'+':''}$${p.leftover.toFixed(0)}</div></div>`;
            });return h;
        }

        // === MAIN RENDER ===
        function render(){
            const app=document.getElementById('app');
            if(currentTab==='home')app.innerHTML=renderHome();
            else if(currentTab==='budget')app.innerHTML=renderBudget();
            else if(currentTab==='history')app.innerHTML=renderHistory();
            else if(currentTab==='settings')app.innerHTML=renderSettings();
            // Show/hide FAB
            document.getElementById('fabBtn').style.display=state.active?'flex':'none';
            setTimeout(()=>{const inp=document.getElementById('paycheckInput');if(inp)inp.addEventListener('keypress',e=>{if(e.key==='Enter')handleAllocate();});},50);
        }
        function handleAllocate(){const inp=document.getElementById('paycheckInput');const a=parseFloat(inp.value);if(!a||a<=0)return;allocatePaycheck(a);}
        render();
    </script>
</body>
</html>
