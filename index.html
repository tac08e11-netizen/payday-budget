<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>PayDay Budget</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 100px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 1.8rem;
            color: #00d4aa;
            margin-bottom: 4px;
        }

        .header p {
            color: #888;
            font-size: 0.9rem;
        }

        .paycheck-section {
            background: #16213e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .paycheck-section label {
            display: block;
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .paycheck-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .paycheck-input-row input {
            width: 150px;
            padding: 12px 16px;
            font-size: 1.5rem;
            background: #0f3460;
            border: 2px solid #00d4aa;
            border-radius: 12px;
            color: #fff;
            text-align: center;
            outline: none;
        }

        .paycheck-input-row input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 212, 170, 0.3);
        }

        .btn-allocate {
            padding: 12px 24px;
            background: #00d4aa;
            color: #1a1a2e;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-allocate:active {
            transform: scale(0.95);
            background: #00b894;
        }

        .period-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #16213e;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        .period-info .total {
            color: #00d4aa;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .btn-reset {
            padding: 6px 14px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .categories {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-card {
            background: #16213e;
            border-radius: 14px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }

        .category-card.protected { border-left: 4px solid #3498db; }
        .category-card.flexible { border-left: 4px solid #f39c12; }
        .category-card.fun { border-left: 4px solid #9b59b6; }
        .category-card.overspent { border-left: 4px solid #e74c3c; background: #2c1a1a; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .card-header .name { font-weight: 600; font-size: 1rem; }

        .card-header .badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.protected { background: #1a3a5c; color: #3498db; }
        .badge.flexible { background: #3d2e0a; color: #f39c12; }
        .badge.fun { background: #2d1a3d; color: #9b59b6; }

        .card-amounts {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }

        .remaining { font-size: 1.4rem; font-weight: 700; color: #00d4aa; }
        .remaining.danger { color: #e74c3c; }
        .remaining.warning { color: #f39c12; }
        .allocated { color: #666; font-size: 0.85rem; }

        .progress-bar {
            height: 6px;
            background: #0f3460;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-fill.good { background: #00d4aa; }
        .progress-fill.warning { background: #f39c12; }
        .progress-fill.danger { background: #e74c3c; }

        .btn-spend {
            width: 100%;
            padding: 10px;
            background: #0f3460;
            border: 1px solid #234;
            border-radius: 10px;
            color: #ddd;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-spend:active { background: #1a4a7a; transform: scale(0.98); }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #16213e;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 340px;
            text-align: center;
        }

        .modal h3 { margin-bottom: 20px; color: #00d4aa; }

        .modal input {
            width: 100%;
            padding: 14px;
            font-size: 1.8rem;
            background: #0f3460;
            border: 2px solid #234;
            border-radius: 12px;
            color: #fff;
            text-align: center;
            outline: none;
            margin-bottom: 8px;
        }

        .modal input:focus { border-color: #00d4aa; }

        .modal .note-input {
            width: 100%;
            padding: 10px;
            font-size: 0.9rem;
            background: #0f3460;
            border: 1px solid #234;
            border-radius: 8px;
            color: #ccc;
            text-align: center;
            outline: none;
            margin-bottom: 16px;
        }

        .modal-buttons { display: flex; gap: 10px; }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-confirm { background: #00d4aa; color: #1a1a2e; }
        .btn-cancel { background: #333; color: #ccc; }

        .history-section {
            margin-top: 24px;
            background: #16213e;
            border-radius: 14px;
            padding: 16px;
        }

        .history-section h3 {
            color: #888;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #0f3460;
            font-size: 0.85rem;
        }

        .history-item:last-child { border-bottom: none; }
        .history-item .cat { color: #888; }
        .history-item .amount { color: #e74c3c; font-weight: 600; }
        .history-item .note { color: #666; font-size: 0.75rem; }

        .no-budget { text-align: center; padding: 60px 20px; color: #555; }
        .no-budget p { margin-top: 10px; font-size: 0.9rem; }

        .overflow-notice {
            background: #2c1a1a;
            border: 1px solid #e74c3c;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            color: #e74c3c;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💰 PayDay</h1>
        <p>Budget per paycheck. Stay in control.</p>
    </div>

    <div id="app"></div>

    <div class="modal-overlay" id="spendModal">
        <div class="modal">
            <h3 id="modalTitle">Log Spending</h3>
            <input type="number" id="spendAmount" placeholder="0.00" step="0.01" inputmode="decimal">
            <input type="text" class="note-input" id="spendNote" placeholder="What was it? (optional)">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmSpend()">Log It</button>
            </div>
        </div>
    </div>

    <script>
        // === CONFIG ===
        const CATEGORIES = [
            { id: 'rent', name: '🏠 Rent Fund', pct: 0.19, type: 'protected' },
            { id: 'car', name: '🚗 Car & Gas', pct: 0.09, type: 'protected' },
            { id: 'food', name: '🍔 Food', pct: 0.24, type: 'flexible' },
            { id: 'subs', name: '📱 Subscriptions', pct: 0.04, type: 'protected' },
            { id: 'savings', name: '💎 Savings', pct: 0.12, type: 'protected' },
            { id: 'gaming', name: '🎮 Gaming & Hobbies', pct: 0.18, type: 'fun' },
            { id: 'free', name: '🎯 Free Spend', pct: 0.14, type: 'fun' },
        ];

        const FUN_IDS = ['gaming', 'free'];

        // === STATE ===
        let state = loadState();

        function loadState() {
            const saved = localStorage.getItem('payday_state');
            if (saved) return JSON.parse(saved);
            return { active: false, paycheck: 0, allocations: {}, spent: {}, history: [] };
        }

        function saveState() {
            localStorage.setItem('payday_state', JSON.stringify(state));
        }

        function allocatePaycheck(amount) {
            state.active = true;
            state.paycheck = amount;
            state.allocations = {};
            state.spent = {};
            state.history = [];

            CATEGORIES.forEach(cat => {
                state.allocations[cat.id] = Math.round(amount * cat.pct * 100) / 100;
                state.spent[cat.id] = 0;
            });

            saveState();
            render();
        }

        function getRemaining(catId) {
            return Math.round((state.allocations[catId] - state.spent[catId]) * 100) / 100;
        }

        function getTotalOverage() {
            let overage = 0;
            CATEGORIES.forEach(cat => {
                if (cat.type === 'flexible') {
                    const rem = getRemaining(cat.id);
                    if (rem < 0) overage += Math.abs(rem);
                }
            });
            return overage;
        }

        function getAdjustedRemaining(catId) {
            const cat = CATEGORIES.find(c => c.id === catId);
            let remaining = getRemaining(catId);

            if (cat.type === 'fun') {
                const totalOverage = getTotalOverage();
                if (totalOverage > 0) {
                    const totalFunAlloc = FUN_IDS.reduce((sum, id) => sum + state.allocations[id], 0);
                    const thisFunPct = state.allocations[catId] / totalFunAlloc;
                    const deduction = Math.round(totalOverage * thisFunPct * 100) / 100;
                    remaining -= deduction;
                }
            }

            return Math.round(remaining * 100) / 100;
        }

        function logSpend(catId, amount, note) {
            state.spent[catId] += amount;
            state.history.unshift({
                cat: catId,
                amount: amount,
                note: note || '',
                time: Date.now()
            });
            if (state.history.length > 50) state.history.pop();
            saveState();
            render();
        }

        function resetBudget() {
            if (confirm('Start a new pay period? This clears everything.')) {
                state = { active: false, paycheck: 0, allocations: {}, spent: {}, history: [] };
                saveState();
                render();
            }
        }

        // === MODAL ===
        let currentSpendCat = null;

        function openSpendModal(catId) {
            currentSpendCat = catId;
            const cat = CATEGORIES.find(c => c.id === catId);
            document.getElementById('modalTitle').textContent = `Log: ${cat.name}`;
            document.getElementById('spendAmount').value = '';
            document.getElementById('spendNote').value = '';
            document.getElementById('spendModal').classList.add('active');
            setTimeout(() => document.getElementById('spendAmount').focus(), 100);
        }

        function closeModal() {
            document.getElementById('spendModal').classList.remove('active');
            currentSpendCat = null;
        }

        function confirmSpend() {
            const amount = parseFloat(document.getElementById('spendAmount').value);
            const note = document.getElementById('spendNote').value.trim();
            if (!amount || amount <= 0) return;
            logSpend(currentSpendCat, amount, note);
            closeModal();
        }

        document.getElementById('spendModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('spendModal')) closeModal();
        });

        document.getElementById('spendAmount').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') confirmSpend();
        });

        // === RENDER ===
        function render() {
            const app = document.getElementById('app');

            if (!state.active) {
                app.innerHTML = `
                    <div class="paycheck-section">
                        <label>Enter Your Paycheck</label>
                        <div class="paycheck-input-row">
                            <input type="number" id="paycheckInput" placeholder="850" step="0.01" inputmode="decimal">
                            <button class="btn-allocate" onclick="handleAllocate()">Go</button>
                        </div>
                    </div>
                    <div class="no-budget">
                        <p>Enter your paycheck amount to start budgeting this pay period.</p>
                    </div>
                `;
                setTimeout(() => {
                    const input = document.getElementById('paycheckInput');
                    if (input) {
                        input.addEventListener('keypress', (e) => {
                            if (e.key === 'Enter') handleAllocate();
                        });
                    }
                }, 50);
                return;
            }

            const totalOverage = getTotalOverage();
            let html = '';

            html += `
                <div class="period-info">
                    <div>
                        <span style="color:#888">Paycheck:</span>
                        <span class="total">$${state.paycheck.toFixed(2)}</span>
                    </div>
                    <button class="btn-reset" onclick="resetBudget()">New Period</button>
                </div>
            `;

            if (totalOverage > 0) {
                html += `
                    <div class="overflow-notice">
                        ⚠️ Overspent by $${totalOverage.toFixed(2)} — pulling from Gaming & Free Spend.
                    </div>
                `;
            }

            html += '<div class="categories">';
            CATEGORIES.forEach(cat => {
                const allocated = state.allocations[cat.id];
                const spent = state.spent[cat.id];
                const remaining = cat.type === 'fun' ? getAdjustedRemaining(cat.id) : getRemaining(cat.id);
                const pctRemaining = Math.max(0, (remaining / allocated) * 100);

                let remainClass = '';
                let progressClass = 'good';
                if (remaining < 0) { remainClass = 'danger'; progressClass = 'danger'; }
                else if (remaining < allocated * 0.25) { remainClass = 'warning'; progressClass = 'warning'; }

                const overspentClass = remaining < 0 ? 'overspent' : '';

                html += `
                    <div class="category-card ${cat.type} ${overspentClass}">
                        <div class="card-header">
                            <span class="name">${cat.name}</span>
                            <span class="badge ${cat.type}">${cat.type}</span>
                        </div>
                        <div class="card-amounts">
                            <span class="remaining ${remainClass}">$${remaining.toFixed(2)}</span>
                            <span class="allocated">of $${allocated.toFixed(2)}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${progressClass}" style="width: ${Math.min(100, pctRemaining)}%"></div>
                        </div>
                        <button class="btn-spend" onclick="openSpendModal('${cat.id}')">+ Log Spending</button>
                    </div>
                `;
            });
            html += '</div>';

            if (state.history.length > 0) {
                html += '<div class="history-section"><h3>Recent Transactions</h3>';
                state.history.slice(0, 15).forEach(item => {
                    const cat = CATEGORIES.find(c => c.id === item.cat);
                    const time = new Date(item.time);
                    const timeStr = time.toLocaleDateString();
                    html += `
                        <div class="history-item">
                            <div>
                                <span class="cat">${cat ? cat.name : item.cat}</span>
                                ${item.note ? `<br><span class="note">${item.note}</span>` : ''}
                            </div>
                            <div class="amount">-$${item.amount.toFixed(2)}</div>
                        </div>
                    `;
                });
                html += '</div>';
            }

            app.innerHTML = html;
        }

        function handleAllocate() {
            const input = document.getElementById('paycheckInput');
            const amount = parseFloat(input.value);
            if (!amount || amount <= 0) return;
            allocatePaycheck(amount);
        }

        render();
    </script>
</body>
</html>
